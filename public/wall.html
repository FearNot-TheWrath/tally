<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>Tally · Wall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/layouts.css" />
  <link rel="stylesheet" href="/css/wall-suite.css" />
  <script>
    // Wall is always dark-themed. Setting data-theme=dark switches our CSS
    // variables, and color-scheme: dark in the meta + CSS tells the browser
    // (esp. Edge / Chromium force-dark) NOT to auto-invert the page.
    document.documentElement.setAttribute('data-theme', 'dark');
  </script>
  <style>
    :root { color-scheme: dark; }
    html, body { overflow: hidden; margin: 0; padding: 0; background: #0A0A0A; }
  </style>
</head>
<body>
  <div id="wall-root">
    <header id="wall-header"></header>
    <main id="wall-stage"></main>
  </div>
  <div id="wall-sleep" hidden></div>
  <script type="module" src="/js/pages/wall.js"></script>
</body>
</html>
